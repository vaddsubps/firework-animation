<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firework Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }

        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <h1 class="title">FIREWORKS</h1>
    <p class="instructions">Click anywhere to launch fireworks • They also launch automatically</p>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Firework class - travels from bottom to target
        class Firework {
            constructor(x, targetY) {
                this.x = x;
                this.y = canvas.height;
                this.targetY = targetY;
                this.speed = 8 + Math.random() * 4;
                this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.3;
                this.velocity = {
                    x: Math.cos(this.angle) * this.speed * 0.3,
                    y: Math.sin(this.angle) * this.speed
                };
                this.trail = [];
                this.trailLength = 10;
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }

                this.x += this.velocity.x;
                this.y += this.velocity.y;

                return this.y <= this.targetY;
            }

            draw() {
                // Draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = i / this.trail.length;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha * 0.5})`;
                    ctx.fill();
                }

                // Draw firework
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();

                // Glow effect
                ctx.beginPath();
                ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 200, 100, 0.3)';
                ctx.fill();
            }
        }

        // Particle class - explosion particles
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.velocity = {
                    x: Math.cos(angle) * speed,
                    y: Math.sin(angle) * speed
                };
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.gravity = 0.1;
                this.friction = 0.98;
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.velocity.y += this.gravity;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;

                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // Glow effect
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(')', ', 0.3)').replace('rgb', 'rgba');
                ctx.fill();
                ctx.restore();
            }
        }

        let fireworks = [];
        let particles = [];

        // Color palettes
        const colorPalettes = [
            ['rgb(255, 100, 100)', 'rgb(255, 200, 100)', 'rgb(255, 255, 150)'],
            ['rgb(100, 200, 255)', 'rgb(150, 100, 255)', 'rgb(200, 150, 255)'],
            ['rgb(100, 255, 150)', 'rgb(150, 255, 200)', 'rgb(200, 255, 150)'],
            ['rgb(255, 150, 255)', 'rgb(255, 100, 200)', 'rgb(200, 100, 255)'],
            ['rgb(255, 200, 100)', 'rgb(255, 150, 50)', 'rgb(255, 100, 0)'],
        ];

        function createExplosion(x, y) {
            const palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
            const particleCount = 80 + Math.floor(Math.random() * 40);

            for (let i = 0; i < particleCount; i++) {
                const color = palette[Math.floor(Math.random() * palette.length)];
                particles.push(new Particle(x, y, color));
            }
        }

        function launchFirework(x) {
            const targetY = canvas.height * (0.2 + Math.random() * 0.3);
            fireworks.push(new Firework(x, targetY));
        }

        // Click to launch
        canvas.addEventListener('click', (e) => {
            launchFirework(e.clientX);
        });

        // Auto launch fireworks
        let autoLaunchTimer = 0;
        const autoLaunchInterval = 60;

        function animate() {
            // Semi-transparent black for trail effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw fireworks
            for (let i = fireworks.length - 1; i >= 0; i--) {
                const reachedTarget = fireworks[i].update();
                fireworks[i].draw();

                if (reachedTarget) {
                    createExplosion(fireworks[i].x, fireworks[i].y);
                    fireworks.splice(i, 1);
                }
            }

            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const alive = particles[i].update();
                particles[i].draw();

                if (!alive) {
                    particles.splice(i, 1);
                }
            }

            // Auto launch
            autoLaunchTimer++;
            if (autoLaunchTimer >= autoLaunchInterval && Math.random() < 0.03) {
                launchFirework(Math.random() * canvas.width);
                autoLaunchTimer = 0;
            }

            requestAnimationFrame(animate);
        }

        // Start with a few fireworks
        setTimeout(() => launchFirework(canvas.width * 0.3), 500);
        setTimeout(() => launchFirework(canvas.width * 0.7), 1000);

        animate();
    </script>
</body>
</html>
